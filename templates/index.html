<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURONAL_RED - Bienvenido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <style>
        /* Estilos específicos para la presentación del Index */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdfdfd 0%, #f0f4f8 100%);
            overflow: hidden; /* Para que las partículas no salgan */
        }

        .welcome-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 90%;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        /* Zona Visual (Izquierda) */
        .visual-panel {
            background-color: #f8fafc;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-right: 1px solid #f0f0f0;
        }

        /* Animación de Red de Partículas (CSS Puro) */
        .network-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.5;
        }
        .dot {
            position: absolute;
            background-color: var(--accent);
            border-radius: 50%;
            opacity: 0.6;
            animation: moveParticle infinite linear;
        }
        /* Definimos algunas partículas con distintos tamaños y animaciones */
        .dot:nth-child(1) { width: 10px; height: 10px; top: 20%; left: 20%; animation-duration: 8s; }
        .dot:nth-child(2) { width: 6px; height: 6px; top: 60%; left: 80%; animation-duration: 12s; animation-delay: 2s; }
        .dot:nth-child(3) { width: 8px; height: 8px; top: 80%; left: 30%; animation-duration: 10s; animation-delay: 1s; }
        .dot:nth-child(4) { width: 4px; height: 4px; top: 10%; left: 70%; animation-duration: 15s; }

        @keyframes moveParticle {
            0% { transform: translate(0, 0); }
            25% { transform: translate(30px, 50px); }
            50% { transform: translate(0, 100px); }
            75% { transform: translate(-30px, 50px); }
            100% { transform: translate(0, 0); }
        }

        /* Zona de Login (Derecha) */
        .login-panel {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Guía rápida de flujo de IA */
        .flow-guide {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .flow-step {
            flex: 1;
            text-align: center;
        }
        .flow-step i {
            font-size: 1.2rem;
            color: var(--detalhe);
            margin-bottom: 5px;
            display: block;
        }

        /* Responsivo para móviles */
        @media (max-width: 768px) {
            .welcome-wrapper {
                grid-template-columns: 1fr;
            }
            .visual-panel {
                padding: 30px;
                height: 200px;
            }
            .login-panel {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="welcome-wrapper">
        <div class="visual-panel">
            <div class="network-animation">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <i class="bi bi-cpu" style="font-size: 4rem; color: #6366f1; position: relative; z-index: 2; margin-bottom: 20px;"></i>
            
            <h3 style="position: relative; z-index: 2; color: #333; font-weight: 600; text-align: center;">Procesamiento Neuronal</h3>
            <p style="position: relative; z-index: 2; color: #666; text-align: center; font-size: 0.9rem; max-width: 300px;">
                Nuestro modelo `modelo_red.h5` analiza 20 variables complejas para predecir patrones de rendimiento.
            </p>
        </div>

        <div class="login-panel">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="margin: 0; color: #1e293b; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px;">
                     NEURONAL_RED
                </h2>
                <p style="color: #64748b; margin-top: 5px;">Sistema Inteligente de Análisis Estudiantil</p>
            </div>

            <div class="card" style="padding: 0; border: none; box-shadow: none;">
                <label for="nombre" style="font-size: 0.85rem; color: #555; font-weight: 600; margin-bottom: 5px; display: block;">Identificación del Analista</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo" required>
                
                <button onclick="guardarNombre()" style="margin-top: 10px;">
                    Acceder al Sistema <i class="bi bi-arrow-right-short"></i>
                </button>
            </div>

            <div class="flow-guide">
                <div class="flow-step">
                    <i class="bi bi-person-badge"></i>
                    Identificación
                </div>
                <div class="flow-step" style="color: #eee;">➝</div>
                <div class="flow-step">
                    <i class="bi bi-file-earmark-arrow-up"></i>
                    Cargar CSV
                </div>
                <div class="flow-step" style="color: #eee;">➝</div>
                <div class="flow-step">
                    <i class="bi bi-cpu-fill" style="color: var(--accent);"></i>
                    Análisis IA
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
